name: Build Installers

# Releases happen two ways, both ending in a GitHub Release with the stable
# asset names the in-app updater downloads:
# - AUTO: every push to main (i.e. every merged PR) bumps the PATCH of the
#   latest release (v2.0.2 -> v2.0.3), builds both installers with that version
#   baked in, and publishes the release. Docs-only merges (*.md, docs/,
#   .claude/) are skipped by the version job.
# - MANUAL: pushing a v* tag releases exactly that version. Use this for
#   deliberate minor/major bumps; the next auto release bumps from it.
# workflow_dispatch behaves like AUTO from whatever ref it is run on.
on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:

# Queue release runs instead of overlapping: two quick merges must not both
# compute the same next version.
concurrency:
  group: build-installers
  cancel-in-progress: false

jobs:
  # Decides the release version and whether to release at all.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      skip: ${{ steps.ver.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: ver
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SKIP=false
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
            case "$V" in [1-9]*.[0-9]*.[0-9]*) ;; *) V=1.0.0 ;; esac
          else
            LATEST=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq .tag_name 2>/dev/null || true)
            if [[ -z "$LATEST" ]]; then
              LATEST=$(git tag --list 'v*' --sort=-v:refname | head -1)
            fi
            if [[ -z "$LATEST" ]]; then
              LATEST=v1.0.0
            fi
            BASE="${LATEST#v}"
            IFS=. read -r MA MI PA <<< "$BASE"
            V="$MA.$MI.$((PA+1))"
            # Docs-only merge: nothing shippable changed, skip the release.
            if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
              CHANGED=$(git diff --name-only HEAD^ HEAD 2>/dev/null || true)
              if [[ -n "$CHANGED" ]] && ! grep -qvE '^([^/]*\.md|docs/|\.claude/)' <<< "$CHANGED"; then
                SKIP=true
              fi
            fi
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          echo "Releasing: $SKIP == false -> v$V"

  build-windows:
    needs: version
    if: needs.version.outputs.skip != 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build all modules
        run: mvn -B clean package

      - name: Prepare Client jpackage input
        run: |
          New-Item -ItemType Directory -Force -Path client-jpackage-input
          Copy-Item client/target/todolist-client-1.0.0.jar client-jpackage-input/
          Copy-Item client/target/libs/*.jar client-jpackage-input/

      # Fails here instead of shipping an installer that crashes silently at
      # launch. The module list lives in scripts/installer-modules.txt.
      - name: Guard against missing installer modules
        shell: pwsh
        run: ./scripts/check-installer-modules.ps1

      - name: Read installer module list
        id: mods
        shell: bash
        run: echo "list=$(tr -d '[:space:]' < scripts/installer-modules.txt)" >> "$GITHUB_OUTPUT"

      # --win-upgrade-uuid is a PERMANENT upgrade code and must never change:
      # in-place upgrades are matched by it, so changing it orphans installed copies.
      # -Dtodolist.api.url default comes from the TODOLIST_API_URL repo variable
      # (falls back to the public production API); the connect dialog overrides it.
      - name: Create Windows Client Installer
        shell: cmd
        run: |
          jpackage ^
            --type msi ^
            --name "TodoList Client" ^
            --input client-jpackage-input ^
            --main-jar todolist-client-1.0.0.jar ^
            --main-class dk.dtu.ClientApp ^
            --app-version ${{ needs.version.outputs.version }} ^
            --vendor "TodoList" ^
            --description "TodoList Management Client" ^
            --module-path client-jpackage-input ^
            --add-modules ${{ steps.mods.outputs.list }} ^
            --win-menu ^
            --win-shortcut ^
            --icon client/src/main/resources/Icons/appicon.ico ^
            --win-upgrade-uuid c70294f3-9868-42a9-9ffc-7c3d80b71a4e ^
            --java-options "-Dtodolist.api.url=${{ vars.TODOLIST_API_URL || 'https://api.todolist.patrickrobel.dk' }}" ^
            --java-options "-Dtodolist.version=${{ needs.version.outputs.version }}" ^
            --java-options "--add-opens" ^
            --java-options "javafx.controls/javafx.scene.control.skin=ALL-UNNAMED" ^
            --dest installers

      # Stable, versionless copies so releases/latest/download/<name> never breaks.
      - name: Create stable-named copies
        run: |
          Copy-Item "installers/TodoList Client-${{ needs.version.outputs.version }}.msi" "installers/TodoList-Client-Windows.msi"

      - name: Upload Windows Installers to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            installers/*.msi
            installers/TodoList-Client-Windows.msi
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: version
    if: needs.version.outputs.skip != 'true'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build all modules
        run: mvn -B clean package

      - name: Prepare Client jpackage input
        run: |
          mkdir -p client-jpackage-input
          cp client/target/todolist-client-1.0.0.jar client-jpackage-input/
          cp client/target/libs/*.jar client-jpackage-input/

      # Fails here instead of shipping an installer that crashes silently at
      # launch. The module list lives in scripts/installer-modules.txt.
      - name: Guard against missing installer modules
        shell: pwsh
        run: ./scripts/check-installer-modules.ps1

      - name: Read installer module list
        id: mods
        shell: bash
        run: echo "list=$(tr -d '[:space:]' < scripts/installer-modules.txt)" >> "$GITHUB_OUTPUT"

      # Build a macOS .icns from the client app icon (sips + iconutil are part of
      # macOS, so this is reliable on the runner).
      - name: Generate macOS app icon
        run: |
          SRC=client/src/main/resources/Icons/appicon.png
          mkdir -p icon.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size "$SRC" --out "icon.iconset/icon_${size}x${size}.png"
            sips -z $((size * 2)) $((size * 2)) "$SRC" --out "icon.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns icon.iconset -o TodoList.icns

      # --mac-package-identifier is a PERMANENT bundle identifier and must never
      # change: it is how macOS tracks in-place upgrades of the same app.
      # -Dtodolist.api.url default comes from the TODOLIST_API_URL repo variable
      # (falls back to the public production API); the connect dialog overrides it.
      - name: Create macOS Client DMG
        run: |
          jpackage \
            --type dmg \
            --name "TodoList Client" \
            --input client-jpackage-input \
            --main-jar todolist-client-1.0.0.jar \
            --main-class dk.dtu.ClientApp \
            --app-version ${{ needs.version.outputs.version }} \
            --vendor "TodoList" \
            --description "TodoList Management Client" \
            --module-path client-jpackage-input \
            --add-modules ${{ steps.mods.outputs.list }} \
            --icon TodoList.icns \
            --mac-package-identifier com.patr7257.todolist.client \
            --java-options "-Dtodolist.api.url=${{ vars.TODOLIST_API_URL || 'https://api.todolist.patrickrobel.dk' }}" \
            --java-options "-Dtodolist.version=${{ needs.version.outputs.version }}" \
            --java-options "--add-opens" \
            --java-options "javafx.controls/javafx.scene.control.skin=ALL-UNNAMED" \
            --dest installers

      # Stable, versionless copies so releases/latest/download/<name> never breaks.
      - name: Create stable-named copies
        run: |
          cp "installers/TodoList Client-${{ needs.version.outputs.version }}.dmg" "installers/TodoList-Client-macOS.dmg"

      - name: Upload macOS Installers to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            installers/*.dmg
            installers/TodoList-Client-macOS.dmg
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
